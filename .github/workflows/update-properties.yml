name: Update Naver Properties

on:
  schedule:
    - cron: '0 * * * *' # 매 1시간마다 실행
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch Naver Properties
        env:
          REALTOR_ID: ${{ secrets.REALTOR_ID || '6441115' }}
        run: node fetch-properties.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add properties-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: Naver properties $(date +'%Y-%m-%d %H:%M:%S')" && git push)
